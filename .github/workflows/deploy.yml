name: Deploy to IPFS

permissions:
  contents: read
  pull-requests: write
  statuses: write

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install Kubo and start daemon
        run: |
          curl -sL https://dist.ipfs.tech/kubo/v0.32.0/kubo_v0.32.0_linux-amd64.tar.gz | tar xz
          sudo install -m 0755 kubo/ipfs /usr/local/bin/ipfs
          ipfs init --profile server
          ipfs daemon &
          # Wait until the daemon has peers (connected to IPFS network)
          echo "Waiting for IPFS daemon..."
          for i in $(seq 1 30); do
            ipfs swarm peers 2>/dev/null | grep -q . && echo "Daemon ready" && break
            sleep 2
          done

      - name: Deploy to IPFS via Pinata
        id: deploy
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          npm install pinata --no-save

          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');
          const { PinataSDK } = require('pinata');
          const pinata = new PinataSDK({ pinataJwt: process.env.PINATA_JWT });

          const mime = {
            '.html':'text/html','.css':'text/css','.js':'application/javascript',
            '.json':'application/json','.png':'image/png','.jpg':'image/jpeg',
            '.jpeg':'image/jpeg','.gif':'image/gif','.svg':'image/svg+xml',
            '.txt':'text/plain','.md':'text/markdown','.wasm':'application/wasm',
            '.woff':'font/woff','.woff2':'font/woff2','.ico':'image/x-icon'
          };

          function collect(dir, base, out = []) {
            for (const name of fs.readdirSync(dir)) {
              const full = path.join(dir, name);
              if (fs.statSync(full).isDirectory()) {
                collect(full, base, out);
              } else {
                const rel = path.relative(base, full);
                const buf = fs.readFileSync(full);
                out.push(new File([buf], rel, { type: mime[path.extname(name).toLowerCase()] || 'application/octet-stream' }));
              }
            }
            return out;
          }

          (async () => {
            const files = collect('build', 'build');
            console.log(`Uploading ${files.length} files...`);

            const uploadName = `${process.env.GITHUB_REPOSITORY}@${process.env.GITHUB_SHA}`;
            const res = await pinata.upload.public.fileArray(files)
              .name(uploadName)
              .keyvalues({
                repository: process.env.GITHUB_REPOSITORY,
                commit: process.env.GITHUB_SHA,
                branch: process.env.GITHUB_REF_NAME
              });
            const outerCid = res.cid;
            console.log('Outer CID:', outerCid);

            // Give Pinata a moment to announce the content on the DHT
            await new Promise(r => setTimeout(r, 5000));

            // Use the running kubo daemon to fetch the outer directory block
            // from the IPFS network and extract the inner CID
            let finalCid;
            try {
              const lsOutput = execSync(`ipfs ls --cid-base=base32 /ipfs/${outerCid}`, { timeout: 30000 }).toString().trim();
              console.log('ipfs ls output:', lsOutput);
              // Output format: "<cid> <size> <name>"
              finalCid = lsOutput.split(/\s+/)[0];
            } catch (e) {
              console.warn('ipfs ls failed:', e.message);
            }

            if (!finalCid) {
              // Last resort: use the folderName to guess the inner CID via gateway dag-json
              try {
                const folderName = uploadName.includes('/') ? uploadName.split('/').slice(1).join('/') : uploadName;
                const dagRes = await fetch(
                  `https://gateway.pinata.cloud/ipfs/${outerCid}?format=dag-json`,
                  { headers: { Authorization: `Bearer ${process.env.PINATA_JWT}` }, signal: AbortSignal.timeout(15000) }
                );
                if (dagRes.ok) {
                  const dag = await dagRes.json();
                  const link = dag.Links?.find(l => l.Name === folderName || l.Name === uploadName);
                  if (link) finalCid = link.Hash['/'];
                }
              } catch (e) {
                console.warn('Gateway dag-json also failed:', e.message);
              }
            }

            if (!finalCid) {
              throw new Error(`Could not resolve inner CID from outer CID ${outerCid}. Check IPFS daemon connectivity.`);
            }

            console.log('Inner CID:', finalCid);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `cid=${finalCid}\n`);
          })().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Show result
        run: |
          echo "Deployed CID: ${{ steps.deploy.outputs.cid }}"
          echo "Gateway: https://ipfs.io/ipfs/${{ steps.deploy.outputs.cid }}"
