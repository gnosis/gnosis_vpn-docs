name: Deploy to IPFS

permissions:
  contents: read
  pull-requests: write
  statuses: write

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to IPFS via Pinata
        id: deploy
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          npm install @pinata/sdk --no-save
          node <<'EOF'
          const fs = require('fs');
          const pinataSDK = require('@pinata/sdk');

          const pinata = new pinataSDK({ pinataJWTKey: process.env.PINATA_JWT });

          (async () => {
            const result = await pinata.pinFromFS('./build', {
              pinataMetadata: {
                name: `${process.env.GITHUB_REPOSITORY}@${process.env.GITHUB_SHA}`,
                keyvalues: {
                  repository: process.env.GITHUB_REPOSITORY,
                  commit: process.env.GITHUB_SHA,
                  branch: process.env.GITHUB_REF_NAME
                }
              },
              pinataOptions: {
                wrapWithDirectory: false
              }
            });

            const cid = result.IpfsHash;
            console.log('CID:', cid);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `cid=${cid}\n`);
          })().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Show result
        run: |
          echo "Deployed CID: ${{ steps.deploy.outputs.cid }}"
          echo "Gateway: https://ipfs.io/ipfs/${{ steps.deploy.outputs.cid }}"
