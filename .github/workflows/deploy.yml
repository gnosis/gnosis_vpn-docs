# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy to IPFS

on:
  workflow_dispatch:

env:
  PROJECT_NAME: 'gnosis-vpn-docs'

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  read-node-version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      node_version: ${{ steps.read.outputs.node_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Read Node version from .nvmrc
        id: read
        run: |
          if [ ! -f .nvmrc ]; then
            echo "❌ .nvmrc not found"
            exit 1
          fi

          NODE_VERSION="$(sed 's/^v//' .nvmrc | tr -d '[:space:]')"
          if [ -z "$NODE_VERSION" ]; then
            echo "❌ .nvmrc did not contain a Node version"
            exit 1
          fi

          echo "node_version=$NODE_VERSION" >> "$GITHUB_OUTPUT"

  build-prod:
    needs: read-node-version
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    steps:
      - name: Validate required variables and secrets
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT  }}
        run: |
          set -euo pipefail
          MISSING=0
          for n in PINATA_JWT; do
            [ -n "${!n:-}" ] || { echo "::error::$n is required but not set"; MISSING=1; }
          done
          [ "$MISSING" -ne 0 ] && exit 1

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ needs.read-node-version.outputs.node_version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-${{ github.sha }}
          path: dist
          if-no-files-found: error

  deploy-prod:
    needs: [read-node-version, build-prod]
    uses: gnosis/gh-action-pinata/.github/workflows/pinata-deployment.yml@b0c35b508473efd3b5a826bba4d66de8cb699c29 # mj/unify-workflow
    with:
      environment: prod
      project_name: ${{ env.PROJECT_NAME }}
      build_dir: dist
      build_artifact_name: build-${{ github.sha }}
    secrets:
      PINATA_JWT: ${{ secrets.PINATA_JWT }}
